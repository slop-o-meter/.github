name: Sync README from main repo

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch README from main repo
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/slop-o-meter/slop-o-meter/main/README.md \
            -o profile/README.md

      - name: Commit and push if changed
        run: |
          git diff --quiet profile/README.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git commit -m "sync README from slop-o-meter/slop-o-meter"
          git push
